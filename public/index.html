<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Peach State Behavioral Health — Denial Dashboard</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #fafaf8;
        color: #1a1a1a;
      }
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f2;
        --color-background-tertiary: #eeede8;
        --color-text-primary: #1a1a1a;
        --color-text-secondary: #6b6b68;
        --color-text-tertiary: #9b9b98;
        --color-border-tertiary: rgba(0,0,0,0.12);
        --color-border-secondary: rgba(0,0,0,0.25);
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      button {
        font-family: inherit;
        cursor: pointer;
        border: 0.5px solid rgba(0,0,0,0.2);
        border-radius: 6px;
        background: transparent;
        padding: 6px 14px;
        font-size: 13px;
        color: #1a1a1a;
      }
      button:hover { background: #f0f0ed; }
      select, input, textarea {
        font-family: inherit;
        font-size: 13px;
        padding: 7px 10px;
        border: 0.5px solid rgba(0,0,0,0.2);
        border-radius: 6px;
        background: white;
        color: #1a1a1a;
        outline: none;
      }
      select:focus, input:focus, textarea:focus {
        border-color: rgba(0,0,0,0.4);
      }
      pre { white-space: pre-wrap; word-break: break-word; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
